[package]
name = "bombadil-terminal"
version.workspace = true
edition.workspace = true

[[bin]]
name = "bombadil-terminal"
path = "src/main.rs"

[dependencies]
bombadil = { path = "../bombadil" }
bombadil-browser-keys = { path = "../bombadil-browser-keys" }
bombadil-schema = { path = "../bombadil-schema" }
anyhow = "1.0"
clap = { version = "4.5.46", features = ["derive"] }
env_logger = "0.11.8"
include_dir = "0.7.4"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.22.0"
tokio = { version = "1.48.0", features = ["full"] }
# libghostty-vt = "0.1.1"

[dev-dependencies]
indoc = "2.0.7"
insta = "1.43.1"
proptest = "1.10.0"

[build-dependencies]
glob = "0.3.3"
